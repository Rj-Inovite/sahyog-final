name: my_app
description: "A new Flutter project with Sahyog Face Recognition."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Machine Learning & Camera ---
  # tflite_flutter 0.12.1 is critical for 2026 Android 15 support
  tflite_flutter: ^0.12.1 
  google_mlkit_face_detection: ^0.11.0
  camera: ^0.11.0+2
  image: ^4.3.0

  # --- Networking (Dio & Retrofit) ---
  dio: ^5.7.0
  retrofit: ^4.5.0
  json_annotation: ^4.9.0
  http: ^1.3.0
  pretty_dio_logger: ^1.4.0
  url_launcher: ^6.3.1

  # --- UI & Animation ---
  animate_do: ^3.3.4
  animated_text_kit: ^4.2.2
  table_calendar: ^3.1.2
  logger: ^2.5.0

  # --- Local Storage & Utils ---
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.0
  image_picker: ^1.1.2
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Builders for Retrofit/Json
  build_runner: ^2.4.14
  # Pinning retrofit_generator to 10.2.3 to ensure build_runner stability
  retrofit_generator: 10.2.3 
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/g_logo.png
    - assets/images/b_logo.png
    - assets/mobilefacenet.tflite